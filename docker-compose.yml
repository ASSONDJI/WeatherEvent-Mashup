version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mashup-postgres
    environment:
      POSTGRES_USER: mashup
      POSTGRES_PASSWORD: mashup123
      POSTGRES_DB: mashup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mashup"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mashup-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mashup-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mashup-network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mashup-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - mashup-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mashup-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mashup-network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mashup-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - mashup-network
    restart: unless-stopped

networks:
  mashup-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mashup_db}
    username: ${SPRING_DATASOURCE_USERNAME:mashup}
    password: ${SPRING_DATASOURCE_PASSWORD:mashup123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  cache:
    type: simple

api:
  openweather:
    key: ${OPENWEATHER_API_KEY}
    url: https://api.openweathermap.org/data/2.5
  ticketmaster:
    key: ${TICKETMASTER_API_KEY}
    url: https://app.ticketmaster.com/discovery/v2

mock:
  weather:
    enabled: false
  events:
    enabled: false
  recommendations:
    enabled: true

logging:
  level:
    com.mashup: DEBUG
    io.github.resilience4j: INFO

server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/mashup_db
    username: mashup
    password: mashup123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cache:
    type: redis
    redis:
      time-to-live: 600000
api:
  openweather:
    key: ${OPENWEATHER_API_KEY}
  ticketmaster:
    key: ${TICKETMASTER_API_KEY}
mock:
  weather:
    enabled: false
  events:
    enabled: false
  recommendations:
    enabled: true
logging:
  level:
    com.mashup: DEBUG
server:
  port: 8080
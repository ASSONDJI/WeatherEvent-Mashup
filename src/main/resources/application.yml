spring:
  application:
    name: weather-event-mashup
  profiles:
    active: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mashup_db}
    username: ${SPRING_DATASOURCE_USERNAME:mashup}
    password: ${SPRING_DATASOURCE_PASSWORD:mashup123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  cache:
    type: simple
  jackson:
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

api:
  openweather:
    key: ${OPENWEATHER_API_KEY:}
    url: https://api.openweathermap.org/data/2.5
  ticketmaster:
    key: ${TICKETMASTER_API_KEY:}
    url: https://app.ticketmaster.com/discovery/v2

resilience4j:
  circuitbreaker:
    instances:
      weatherApi:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
      eventsApi:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
      recommendationsApi:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50

mock:
  weather:
    enabled: false
  events:
    enabled: false
  recommendations:
    enabled: true

logging:
  level:
    com.mashup: DEBUG
    io.github.resilience4j: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always